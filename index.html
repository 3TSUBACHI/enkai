<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  </head>
  <style>
    .actions {
      position: absolute;
      display: flex;
      flex-direction: row;
      bottom: 3%;
      left: 3%;
    }    
    .actions .buttonUI {
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .actions .button {
      cursor: pointer;
      background: #fff;
      height: 40px;
      width: 40px;
      border-radius: 40px;
      margin-right: 10px;
      font-size: large;
    }
      /* スタート画面 */
      #start-screen {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(0, 0, 0, 0.7);
        color: white;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        font-family: sans-serif;
        z-index: 999;
      }
      #start-screen h1 { font-size: 2em; margin-bottom: 20px; }
      #start-screen p { margin: 5px 0; }
      button {
        margin-top: 10px;
        padding: 8px 12px;
        font-size: 1em;
        cursor: pointer;
      }
      input {
        margin-top: 10px;
        padding: 4px 6px;
        font-size: 0.9em;
        width: 160px;
      }

      /* おまけ画面 */
      #bonus-screen {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(0, 0, 50, 0.95);
        color: white;
        display: none;
        justify-content: center;
        align-items: center;
        font-family: sans-serif;
        z-index: 1000;
        text-align: center;
        padding: 20px;
      }
      #bonus-screen img {
        margin-top: 20px;
        max-width: 80%;
        height: auto;
        border: 2px solid #fff;
        border-radius: 8px;
      }

      /* 戻るボタン */
      #back-button {
        position: fixed;
        top: 10px;
        left: 10px;
        z-index: 1100;
        padding: 6px 12px;
        font-size: 0.9em;
        border-radius: 6px;
        border: none;
        cursor: pointer;
        background: rgba(255,255,255,0.8);
        display: none; /* デフォルト非表示 */
      }
  </style>

  <body>
    <!--  スタート画面 -->
    <div id="start-screen">
      <h1>スマホ版</h1>
      <h1>無限縁会! ～ENTERTAINMENTS!～会場</h1>
      <p>操作方法：</p>
      <p>左下十字キー … 移動</p>
      <p>画面スワイプ … 視点操作</p>
      <p>⚠️横画面推奨</p>
      <p>壁をすり抜けないよ</p>
      <p>うにお願いします</p>
      <button id="start-button">スタート</button>

      <!--  パスワード入力 -->
      <h1> </h1>
      <input type="password" id="secret-input" placeholder="キーワードを入力">
      <button id="bonus-button">おまけを見る</button>
      <h1> </h1>
      <p>製作者: 三ツ鉢(@Mi2Bachi_P)</p>
    </div>

    <!--  おまけ画面 -->
    <div id="bonus-screen">
      <div>
        <h2>🚀見つけてくれてありがとう😽</h2>
        <p>ネップリにて特製ステッカーをプレゼント！</p>
        <p>※イベント終了後一般公開します</p>
        <h2>ユーザー番号：WUKLU3DWF9</h2>
        <p>ローソン/ファミマ/ミニストップ・ステッカー印刷・L版フチ無し推奨</p>
        <p>印刷報告・写真のSNSアップOK！</p>
        <img src="bonus.png" alt="おまけ画像">
      </div>
    </div>

    <!-- ⬅ 戻るボタン -->
    <button id="back-button">← 戻る</button>

    <!--  A-Frameシーン -->
    <a-scene>
      <a-entity id="rig" position="0 8 10" movement-controls="speed: 0.3">
        <a-camera wasd-controls look-controls="pointerLockEnabled: true"></a-camera>
      </a-entity>

      <a-gltf-model src="model.glb"
        position="0 0 0"
        scale="1 1 1"
        uv-scroll="speed: 0.1; materialName: GamingRainbow">
      </a-gltf-model>

      <a-entity light="type: ambient; intensity: 0.3"></a-entity>
      <a-entity light="type: directional; intensity: 0.3" position="1 3 2"></a-entity>

      <a-sky src="space.jpg"></a-sky>
    </a-scene>

    <script>
      const startBtn = document.getElementById("start-button");
      const bonusBtn = document.getElementById("bonus-button");
      const startScreen = document.getElementById("start-screen");
      const bonusScreen = document.getElementById("bonus-screen");
      const backBtn = document.getElementById("back-button");
      const input = document.getElementById("secret-input");

      // スタートボタン
      startBtn.addEventListener("click", () => {
        startScreen.style.display = "none";
        backBtn.style.display = "block"; // 戻るボタン表示
      });

      // おまけ画面
      bonusBtn.addEventListener("click", () => {
        const keyword = "PVS315"; //  パスワード設定
        if (input.value === keyword) {
          startScreen.style.display = "none";
          bonusScreen.style.display = "flex";
          backBtn.style.display = "block"; // 戻るボタン表示
        } else {
          alert("キーワードが違います！");
        }
      });

      // 戻るボタン
      backBtn.addEventListener("click", () => {
        startScreen.style.display = "flex";
        bonusScreen.style.display = "none";
        backBtn.style.display = "none"; // 戻るボタン非表示
      });
    </script>

    <!--  UVアニメーションコンポーネント -->
    <script>
      AFRAME.registerComponent("uv-scroll", {
        schema: {
          speed: { type: "number", default: 0.15 },
          materialName: { type: "string", default: "GamingRainbow" }
        },
        tick: function (time, timeDelta) {
          const mesh = this.el.getObject3D("mesh");
          if (!mesh) return;
          mesh.traverse(obj => {
            if (obj.isMesh && obj.material && obj.material.name === this.data.materialName) {
              const tex = obj.material.emissiveMap;
              if (tex) {
                tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
                tex.offset.x += this.data.speed * timeDelta / 1000;
              }
            }
          });
        }
      });
      function isEmptyObject (keys) {
        var key;
        for (key in keys) { return false; }
        return true;
      }

      AFRAME.registerComponent("button-wasd-controls", {
        schema: {
          acceleration: { default: 65 },
          adAxis: { default: "x", oneOf: ["x", "y", "z"] },
          adEnabled: { default: true },
          enabled: { default: true },
          fly: { default: false },
          wsAxis: { default: "z", oneOf: ["x", "y", "z"] },
          wsEnabled: { default: true },
          key: { default: "w" },
        },

        init: function () {
          // 変数定義
          this.buttons = {};
          this.easing = 1.1;
          this.velocity = new THREE.Vector3();

          // 物理定数
          var CLAMP_VELOCITY = this.CLAMP_VELOCITY = 0.00001;
          var MAX_DELTA = this.MAX_DELTA = 0.2;

          // ボタンのIDと要素取得
          var BUTTON_IDS = this.BUTTON_IDS = ["upBtn", "leftBtn", "downBtn", "rightBtn"];
          var buttonEles = this.buttonEles= BUTTON_IDS.map(btnId => document.getElementById(btnId));

          // 関数をthisでbind
          this.onMouseDown = this.onMouseDown.bind(this);
          this.onMouseUp = this.onMouseUp.bind(this);
          this.attachMouseEventListners = this.attachMouseEventListners.bind(this);

          // イベントリスナーを一括登録
          this.attachMouseEventListners()
        },

        tick: function (time, delta) {
          var data = this.data;
          var el = this.el;
          var velocity = this.velocity;

          // 速度が0で、かつ、キー入力もない場合は何もしない
          if (
            !velocity[data.adAxis] &&
            !velocity[data.wsAxis] &&
            isEmptyObject(this.buttons) 
          ) {
            return;
          }

          // 速度が0でない、もしくは、キー入力があった場合は速度を計算する。
          delta = delta / 1000;
          this.updateVelocity(delta);

          // 計算の結果、速度が0になったなら何もしない
          if (!velocity[data.adAxis] && !velocity[data.wsAxis]) {
            return;
          }

          // 速度が0じゃない場合、速度に応じて座標を更新する
          el.object3D.position.add(this.getMovementVector(delta));
        },        

        updateVelocity: function (delta) {
          var acceleration;
          var adAxis;
          var adSign;
          var data = this.data;
          var buttons = this.buttons;
          var velocity = this.velocity;
          var MAX_DELTA = this.MAX_DELTA
          var CLAMP_VELOCITY = this.CLAMP_VELOCITY
          var wsAxis;
          var wsSign;

          adAxis = data.adAxis;
          wsAxis = data.wsAxis;

          // velocity["x"]がx軸方向=横の速度 velocity["z"]が奥行き方向の速度
          // FPSが低すぎる場合は速度を0にする
          if (delta > MAX_DELTA) {
            velocity[adAxis] = 0;
            velocity[wsAxis] = 0;
            return;
          }

          // 減速の計算。速度が0でない場合、必ずここを通って減速処理する。定義したeasingの値によって減速具合が変わる
          var scaledEasing = Math.pow(1 / this.easing, delta * 60);
          if (velocity[adAxis] !== 0) {
            velocity[adAxis] = velocity[adAxis] * scaledEasing;
          }
          if (velocity[wsAxis] !== 0) {
            velocity[wsAxis] = velocity[wsAxis] * scaledEasing;
          }

          // 減速の計算後、速度の絶対値がCLAMP_VELOCITYよりも小さいときは速度を0にして停止する
          if (Math.abs(velocity[adAxis]) < CLAMP_VELOCITY) {
            velocity[adAxis] = 0;
          }
          if (Math.abs(velocity[wsAxis]) < CLAMP_VELOCITY) {
            velocity[wsAxis] = 0;
          }

          // schemeで定義したenabled がfalseに設定されている時は減速までで計算終了
          if (!data.enabled) {
            return;
          }

          // 押されたキーに応じて加速を計算する    
          acceleration = data.acceleration;   

          // 左右方向の速度を算出 加速度 × 時間変化
          if (data.adEnabled) {
            adSign = data.adInverted ? -1 : 1;
            if ( buttons.leftBtn ) {
              velocity[adAxis] -= adSign * acceleration * delta;
            }
            if ( buttons.rightBtn ) {
              velocity[adAxis] += adSign * acceleration * delta;
            }
          }

          // 奥行き方向の速度を算出 加速度 × 時間変化
          if (data.wsEnabled) {
            wsSign = data.wsInverted ? -1 : 1;
            if ( buttons.upBtn ) {
              velocity[wsAxis] -= wsSign * acceleration * delta;
            }
            if ( buttons.downBtn ) {
              velocity[wsAxis] += wsSign * acceleration * delta;
            }
          }
        },

        getMovementVector: (function () {
          // wasd-controlsと全く一緒
          var directionVector = new THREE.Vector3(0, 0, 0);
          var rotationEuler = new THREE.Euler(0, 0, 0, "YXZ");

          return function (delta) {
            var rotation = this.el.getAttribute("rotation");
            var velocity = this.velocity;
            var xRotation;

            directionVector.copy(velocity);
            directionVector.multiplyScalar(delta);

            // Absolute.
            if (!rotation) {
              return directionVector;
            }

            xRotation = this.data.fly ? rotation.x : 0;

            // Transform direction relative to heading.
            rotationEuler.set(
              THREE.MathUtils.degToRad(xRotation),
              THREE.MathUtils.degToRad(rotation.y),
              0
            );
            directionVector.applyEuler(rotationEuler);
            return directionVector;
          };
        })(),

        // ボタンがクリックされ続けている間、そのボタンのフラグをtrueにする
        onMouseDown: function (event) {
          var pushedBtn = event.srcElement.id;
          this.buttons[pushedBtn] = true;
        },

        // ボタンからクリックが離れたら、そのボタンのフラグをfalseにする
        onMouseUp: function (event) {
          var releasedBtn = event.srcElement.id;
          delete this.buttons[releasedBtn];
        },

        // イベントリスナーをまとめて登録する
        attachMouseEventListners: function () {
          var buttonEles = this.buttonEles;
          for (const buttonEle of buttonEles) {
            buttonEle.addEventListener("mousedown", this.onMouseDown);
            buttonEle.addEventListener("mouseup", this.onMouseUp);
            buttonEle.addEventListener("touchstart", this.onMouseDown);
            buttonEle.addEventListener("touchend", this.onMouseUp);
          }
        },

        // イベントリスナーをまとめて削除する
        removeMouseEventListeners: function () {
          var buttonEles = this.buttonEles;
          for (const buttonEle of buttonEles) {
            buttonEle.removeEventListener("mousedown", this.onMouseDown);
            buttonEle.removeEventListener("mouseup", this.onMouseUp);
            buttonEle.addEventListener("touchstart", this.onMouseDown);
            buttonEle.addEventListener("touchend", this.onMouseUp);
          }
        },

        // 軸が変更された時、たとえば左右を表すad軸が変更された場合、古い方のad軸方向速度を0にする。
        update: function (oldData) {
          // Reset velocity if axis have changed.
          if (oldData.adAxis !== this.data.adAxis) { this.velocity[oldData.adAxis] = 0; }
          if (oldData.wsAxis !== this.data.wsAxis) { this.velocity[oldData.wsAxis] = 0; }
        },
      });
    </script>



    <a-scene id="scene">
      <a-entity id="player" position="0 8 10" button-wasd-controls>
        <a-camera
          near="0.1" far="500"
        ></a-camera>
      </a-entity>
     <!--  空間モデル + UVスクロール --> 
          <a-gltf-model 
          src="model.glb" 
          position="0 0 0" 
          scale="1 1 1" 
          uv-scroll="speed: 0.1; materialName: GamingRainbow"
           ></a-gltf-model> 
           <!-- 照明 -->
             <a-entity 
             light="type: ambient; intensity: 0.15"
             ></a-entity>
              <a-entity 
              light="type: directional; intensity: 0.15" 
              position="1 3 2"
              ></a-entity> 
              <!-- 空の色 --> 
               <a-sky 
               src="space.jpg"
               ></a-sky> 
    </a-scene>

    <div class="actions">
      <div class="buttonUI">
        <button id="leftBtn" type="button" class="button">←</button>
      </div>
      <div class="buttonUI">
        <button id="upBtn" type="button" class="button">↑</button>    
        <br>  
        <button id="downBtn" type="button" class="button">↓</button>
      </div>
      <div class="buttonUI">
        <button id="rightBtn" type="button" class="button">→</button>
      </div>      
    </div>
  </body>
</html>
